name: Dev Links And Deploy Metadata

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

      - name: Trigger deployment webhook if configured
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -n "$DEPLOY_WEBHOOK_URL" ]; then
            curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"
          else
            echo 'DEPLOY_WEBHOOK_URL 未配置，跳过外部部署触发步骤。'
          fi

      - name: Sync README links
        env:
          DEPLOY_BASE_URL: ${{ vars.DEPLOY_BASE_URL }}
          APP_VERSION: ${{ github.sha }}
        run: |
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          node scripts/sync-links.mjs \
            --mode ci \
            --base-url "$DEPLOY_BASE_URL" \
            --version "${APP_VERSION::7}" \
            --timestamp "$TIMESTAMP"

      - name: Commit updated link metadata
        run: |
          if git diff --quiet README.md latest-access-links.json; then
            echo 'No link metadata changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md latest-access-links.json
          git commit -m 'docs: update access links metadata [skip ci]'
          git push
